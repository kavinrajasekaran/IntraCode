<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>InterAgent — Project Overview</title>
  <meta name="description" content="InterAgent — browse all your AI-touched projects in one place.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a12;
      --sidebar-bg: #0e0e1c;
      --surface: #131325;
      --card: #1a1a30;
      --card-hover: #20203a;
      --border: #222240;
      --border-light: #2e2e52;
      --accent: #7c6af7;
      --accent-2: #a78bfa;
      --accent-soft: rgba(124,106,247,0.1);
      --accent-glow: rgba(124,106,247,0.2);
      --text: #e8eaf6;
      --text-2: #9da3c2;
      --dim: #555878;
      --green: #22c55e;
      --yellow: #f59e0b;
      --red: #ef4444;
      --blue: #3b82f6;
      --indigo: #6366f1;
      --r: 10px;
      --r-sm: 7px;
      --t: 0.18s cubic-bezier(0.4,0,0.2,1);
    }

    html, body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
      font-size: 13px;
      -webkit-font-smoothing: antialiased;
    }

    /* ── App Shell ─────────────────────────────────────────── */
    .shell {
      display: grid;
      grid-template-columns: 260px 1fr;
      grid-template-rows: 48px 1fr;
      height: 100vh;
    }

    /* ── Topbar ────────────────────────────────────────────── */
    .topbar {
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      background: var(--sidebar-bg);
      border-bottom: 1px solid var(--border);
      gap: 16px;
      z-index: 20;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 9px;
    }
    .brand-icon {
      font-size: 18px;
      line-height: 1;
    }
    .brand-name {
      font-size: 15px;
      font-weight: 800;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #7c6af7, #c4b5fd);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .brand-version {
      font-size: 10px;
      font-weight: 600;
      color: var(--dim);
      background: rgba(255,255,255,0.05);
      padding: 2px 7px;
      border-radius: 20px;
      border: 1px solid var(--border);
    }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .status-dot {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      font-weight: 600;
      color: var(--dim);
    }
    .status-dot .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--green);
      animation: pulse-dot 2s ease-in-out infinite;
      box-shadow: 0 0 6px var(--green);
    }
    @keyframes pulse-dot {
      0%,100% { opacity:1; }
      50% { opacity:0.3; }
    }

    .btn {
      padding: 6px 14px;
      border-radius: var(--r-sm);
      border: none;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      font-family: inherit;
      transition: var(--t);
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .btn:active { transform: scale(0.96); }
    .btn-ghost {
      background: rgba(255,255,255,0.04);
      color: var(--text-2);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover { background: rgba(255,255,255,0.08); color: var(--text); border-color: var(--border-light); }
    .btn-primary {
      background: linear-gradient(135deg, var(--accent), #6253e1);
      color: #fff;
      box-shadow: 0 2px 10px var(--accent-glow);
    }
    .btn-primary:hover { box-shadow: 0 4px 18px var(--accent-glow); transform: translateY(-1px); }

    /* ── Sidebar ───────────────────────────────────────────── */
    .sidebar {
      background: var(--sidebar-bg);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .sidebar-header {
      padding: 14px 16px 10px;
      flex-shrink: 0;
    }
    .sidebar-title {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--dim);
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .sidebar-search {
      position: relative;
    }
    .sidebar-search input {
      width: 100%;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--r-sm);
      padding: 7px 10px 7px 30px;
      color: var(--text);
      font-size: 12px;
      font-family: inherit;
      outline: none;
      transition: var(--t);
    }
    .sidebar-search input:focus { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-soft); }
    .sidebar-search input::placeholder { color: var(--dim); }
    .sidebar-search .search-icon {
      position: absolute;
      left: 9px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--dim);
      pointer-events: none;
    }

    .project-list {
      flex: 1;
      overflow-y: auto;
      padding: 6px 8px 12px;
    }
    .project-list::-webkit-scrollbar { width: 3px; }
    .project-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    .project-item {
      display: flex;
      flex-direction: column;
      gap: 5px;
      padding: 10px 10px;
      border-radius: var(--r-sm);
      cursor: pointer;
      transition: var(--t);
      border: 1px solid transparent;
      margin-bottom: 2px;
    }
    .project-item:hover { background: var(--card); border-color: var(--border); }
    .project-item.active {
      background: var(--accent-soft);
      border-color: rgba(124,106,247,0.3);
    }
    .project-item.active .proj-name { color: var(--accent-2); }

    .proj-name {
      font-weight: 600;
      font-size: 13px;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .proj-path {
      font-size: 10px;
      color: var(--dim);
      font-family: 'JetBrains Mono', monospace;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .proj-signals {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
      margin-top: 2px;
    }
    .signal-chip {
      font-size: 9px;
      font-weight: 600;
      padding: 2px 6px;
      border-radius: 4px;
      letter-spacing: 0.02em;
      text-transform: uppercase;
    }
    .chip-mcp     { background: rgba(124,106,247,0.15); color: var(--accent-2); border: 1px solid rgba(124,106,247,0.2); }
    .chip-brain   { background: rgba(34,197,94,0.1);   color: #4ade80;         border: 1px solid rgba(34,197,94,0.2); }
    .chip-agents  { background: rgba(245,158,11,0.1);  color: #fbbf24;         border: 1px solid rgba(245,158,11,0.2); }
    .chip-cursor  { background: rgba(59,130,246,0.1);  color: #60a5fa;         border: 1px solid rgba(59,130,246,0.2); }
    .chip-copilot { background: rgba(239,68,68,0.1);   color: #f87171;         border: 1px solid rgba(239,68,68,0.2); }
    .chip-wind    { background: rgba(16,185,129,0.1);  color: #34d399;         border: 1px solid rgba(16,185,129,0.2); }

    .sidebar-empty {
      text-align: center;
      padding: 40px 16px;
      color: var(--dim);
      font-size: 12px;
      line-height: 1.6;
    }

    /* ── Main ──────────────────────────────────────────────── */
    .main {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Welcome state ─────────────────────────────────────── */
    .welcome {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: var(--dim);
    }
    .welcome-icon { font-size: 48px; opacity: 0.3; }
    .welcome h2 { font-size: 17px; font-weight: 700; color: var(--text-2); }
    .welcome p { font-size: 13px; max-width: 340px; text-align: center; line-height: 1.7; }

    /* ── Project Detail ─────────────────────────────────────── */
    .detail {
      flex: 1;
      overflow-y: auto;
      padding: 20px 24px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }
    .detail::-webkit-scrollbar { width: 4px; }
    .detail::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    /* Project header */
    .detail-header {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      justify-content: space-between;
    }
    .detail-title-group { flex: 1; min-width: 0; }
    .detail-name {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -0.02em;
      color: var(--text);
    }
    .detail-path {
      font-size: 11px;
      font-family: 'JetBrains Mono', monospace;
      color: var(--dim);
      margin-top: 3px;
      word-break: break-all;
    }
    .detail-signals { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }

    /* Section */
    .section-title {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--dim);
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .section-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ── MCP Section ────────────────────────────────────────── */
    .mcp-grid {
      display: grid;
      gap: 10px;
    }
    .mcp-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 14px 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      transition: var(--t);
    }
    .mcp-card:hover { border-color: var(--border-light); background: var(--card-hover); }
    .mcp-card-top {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .mcp-icon {
      width: 32px; height: 32px;
      border-radius: 8px;
      background: var(--accent-soft);
      border: 1px solid rgba(124,106,247,0.2);
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
    }
    .mcp-server-name {
      font-weight: 700;
      font-size: 14px;
      color: var(--text);
    }
    .mcp-server-sub {
      font-size: 11px;
      color: var(--dim);
      margin-top: 1px;
    }
    .mcp-command {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(0,0,0,0.3);
      border: 1px solid var(--border);
      border-radius: var(--r-sm);
      padding: 8px 12px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--text-2);
      word-break: break-all;
    }
    .mcp-command .cmd-label {
      color: var(--accent-2);
      font-weight: 600;
      flex-shrink: 0;
    }

    /* ── Stats row ──────────────────────────────────────────── */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 10px;
    }
    .stat-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 12px 14px;
      display: flex;
      flex-direction: column;
      gap: 3px;
      transition: var(--t);
    }
    .stat-card:hover { border-color: var(--border-light); }
    .stat-label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--dim);
    }
    .stat-value {
      font-size: 26px;
      font-weight: 800;
      letter-spacing: -0.02em;
      line-height: 1;
    }
    .stat-pending   .stat-value { color: var(--indigo); }
    .stat-inprogress .stat-value { color: var(--yellow); }
    .stat-done      .stat-value { color: var(--green); }
    .stat-memories  .stat-value { color: var(--accent-2); }
    .stat-blockers  .stat-value { color: var(--red); }

    /* ── Two-col layout ─────────────────────────────────────── */
    .two-col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
      align-items: start;
    }

    /* ── Lists ──────────────────────────────────────────────── */
    .item-list {
      display: flex;
      flex-direction: column;
      gap: 7px;
    }
    .list-item {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--r-sm);
      padding: 10px 13px;
      border-left: 3px solid var(--border-light);
      transition: var(--t);
    }
    .list-item:hover { background: var(--card-hover); }
    .list-item.is-blocker { border-left-color: var(--red); }
    .list-item.is-warning { border-left-color: var(--yellow); }
    .list-item.is-info    { border-left-color: var(--blue); }
    .list-item.is-task-pending { border-left-color: var(--indigo); }
    .list-item.is-task-active  { border-left-color: var(--yellow); }
    .list-item.is-task-done    { border-left-color: var(--green); }
    .list-item.is-decision     { border-left-color: var(--accent); }
    .list-item.is-fail         { border-left-color: var(--red); }

    .li-title {
      font-weight: 600;
      font-size: 12px;
      line-height: 1.4;
      color: var(--text);
    }
    .li-sub {
      font-size: 11px;
      color: var(--text-2);
      margin-top: 3px;
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .li-meta {
      font-size: 10px;
      color: var(--dim);
      margin-top: 5px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .li-badge {
      font-size: 9px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      padding: 1px 6px;
      border-radius: 3px;
    }
    .badge-pending   { background: rgba(99,102,241,0.15); color: #818cf8; }
    .badge-active    { background: rgba(245,158,11,0.15); color: #fbbf24; }
    .badge-done      { background: rgba(34,197,94,0.15);  color: #4ade80; }
    .badge-failed    { background: rgba(239,68,68,0.15);  color: #f87171; }
    .badge-abandoned { background: rgba(100,116,139,0.15);color: #94a3b8; }
    .badge-blocker   { background: rgba(239,68,68,0.15);  color: #f87171; }
    .badge-warning   { background: rgba(245,158,11,0.15); color: #fbbf24; }
    .badge-info      { background: rgba(59,130,246,0.15); color: #60a5fa; }

    .tags-row { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 5px; }
    .tag {
      font-size: 9px;
      font-weight: 600;
      padding: 2px 6px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text-2);
    }

    .empty-state {
      text-align: center;
      padding: 20px;
      color: var(--dim);
      font-size: 12px;
    }

    /* ── Activity feed ──────────────────────────────────────── */
    .activity-item {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
    }
    .activity-item:last-child { border-bottom: none; }
    .activity-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--accent);
      margin-top: 4px;
      flex-shrink: 0;
    }
    .activity-text { font-size: 12px; color: var(--text-2); flex: 1; line-height: 1.5; }
    .activity-meta { font-size: 10px; color: var(--dim); }

    /* ── Toast ──────────────────────────────────────────────── */
    .toast {
      position: fixed; bottom: 20px; right: 20px;
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--r-sm); padding: 11px 16px;
      font-size: 12px; font-weight: 500;
      z-index: 999; opacity: 0; transform: translateY(8px);
      transition: all 0.25s ease; max-width: 320px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }
    .toast.show { opacity: 1; transform: translateY(0); }
    .toast.ok   { border-left: 3px solid var(--green); }
    .toast.err  { border-left: 3px solid var(--red); }

    /* Loading skeleton */
    @keyframes shimmer {
      0% { background-position: -400px 0; }
      100% { background-position: 400px 0; }
    }
    .skeleton {
      background: linear-gradient(90deg, var(--card) 25%, var(--card-hover) 50%, var(--card) 75%);
      background-size: 800px 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 4px;
    }

    @media (max-width: 900px) {
      .shell { grid-template-columns: 220px 1fr; }
      .stats-grid { grid-template-columns: repeat(3, 1fr); }
      .two-col { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<div class="shell">

  <!-- Topbar -->
  <header class="topbar">
    <div class="brand">
      <span class="brand-icon">⛓</span>
      <span class="brand-name">InterAgent</span>
      <span class="brand-version">v1.0</span>
    </div>
    <div class="topbar-right">
      <div class="status-dot" id="serverStatus">
        <span class="dot"></span>
        <span id="serverStatusText">Running</span>
      </div>
      <button class="btn btn-ghost" id="rescanBtn" onclick="rescanProjects()">
        <svg width="11" height="11" viewBox="0 0 12 12" fill="none"><path d="M1 6a5 5 0 019.25-2.63M11 6a5 5 0 01-9.25 2.63" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        Rescan
      </button>
    </div>
  </header>

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-title">
        <span>Projects</span>
        <span id="projectCount" style="font-size:10px;color:var(--dim)">—</span>
      </div>
      <div class="sidebar-search">
        <svg class="search-icon" width="12" height="12" viewBox="0 0 16 16" fill="none">
          <circle cx="7" cy="7" r="5" stroke="currentColor" stroke-width="1.5"/>
          <path d="M11 11l3 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        <input type="text" id="searchInput" placeholder="Filter projects…" oninput="filterProjects()">
      </div>
    </div>
    <div class="project-list" id="projectList">
      <div class="sidebar-empty">Scanning projects…</div>
    </div>
  </aside>

  <!-- Main content -->
  <main class="main" id="mainArea">
    <div class="welcome" id="welcome">
      <div class="welcome-icon">⛓</div>
      <h2>Select a project</h2>
      <p>InterAgent found all your AI-touched projects on the left. Click one to see its MCP configuration, agent tasks, memories, and activity.</p>
    </div>
    <div class="detail" id="detail" style="display:none"></div>
  </main>

</div>
<div class="toast" id="toast"></div>

<script>
const API = window.location.origin + '/api';
let allProjects = [];
let activeProjectPath = null;

// ── Utilities ────────────────────────────────────────────
function fmt(dt) {
  if (!dt) return '';
  const iso = dt.replace(' ','T') + (dt.endsWith('Z') ? '' : 'Z');
  const d = new Date(iso);
  const now = new Date();
  const diff = (now - d) / 1000;
  if (diff < 60) return 'just now';
  if (diff < 3600) return `${Math.floor(diff/60)}m ago`;
  if (diff < 86400) return `${Math.floor(diff/3600)}h ago`;
  return d.toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
}

function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function toast(msg, ok = true) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show ' + (ok ? 'ok' : 'err');
  clearTimeout(el._t);
  el._t = setTimeout(() => el.className = 'toast', 3500);
}

// ── Projects ─────────────────────────────────────────────
async function loadProjects() {
  try {
    const data = await fetch(API + '/projects').then(r => r.json());
    allProjects = data.projects || [];
    document.getElementById('projectCount').textContent = allProjects.length;
    renderProjectList(allProjects);
  } catch {
    document.getElementById('projectList').innerHTML =
      '<div class="sidebar-empty">Could not load projects.<br>Is the server running?</div>';
  }
}

async function rescanProjects() {
  const btn = document.getElementById('rescanBtn');
  btn.disabled = true;
  btn.textContent = 'Scanning…';
  try {
    const data = await fetch(API + '/projects/rescan', { method: 'POST' }).then(r => r.json());
    allProjects = data.projects || [];
    document.getElementById('projectCount').textContent = allProjects.length;
    filterProjects();
    toast(`Found ${allProjects.length} project${allProjects.length !== 1 ? 's' : ''}.`);
  } catch {
    toast('Rescan failed.', false);
  } finally {
    btn.disabled = false;
    btn.innerHTML = `<svg width="11" height="11" viewBox="0 0 12 12" fill="none"><path d="M1 6a5 5 0 019.25-2.63M11 6a5 5 0 01-9.25 2.63" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg> Rescan`;
  }
}

function filterProjects() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const filtered = q ? allProjects.filter(p => p.name.toLowerCase().includes(q) || p.path.toLowerCase().includes(q)) : allProjects;
  renderProjectList(filtered);
}

function signalChips(signals) {
  const chips = [];
  if (signals.hasMcpJson)     chips.push(`<span class="signal-chip chip-mcp">MCP</span>`);
  if (signals.hasInterAgentDb) chips.push(`<span class="signal-chip chip-brain">Brain</span>`);
  if (signals.hasAgentsMd)    chips.push(`<span class="signal-chip chip-agents">Agents</span>`);
  if (signals.hasCursorRules) chips.push(`<span class="signal-chip chip-cursor">Cursor</span>`);
  if (signals.hasWindsurfRules) chips.push(`<span class="signal-chip chip-wind">Windsurf</span>`);
  if (signals.hasCopilotInstructions) chips.push(`<span class="signal-chip chip-copilot">Copilot</span>`);
  return chips.join('');
}

function renderProjectList(projects) {
  const el = document.getElementById('projectList');
  if (!projects.length) {
    el.innerHTML = '<div class="sidebar-empty">No AI-touched projects found.<br>Click Rescan to search again.</div>';
    return;
  }
  el.innerHTML = projects.map(p => `
    <div class="project-item ${p.path === activeProjectPath ? 'active' : ''}"
         data-path="${esc(p.path)}">
      <div class="proj-name">${esc(p.name)}</div>
      <div class="proj-signals">${signalChips(p.signals)}</div>
    </div>
  `).join('');
  // Attach listeners after render (avoids all quote-escaping issues in onclick attrs)
  el.querySelectorAll('.project-item[data-path]').forEach(el => {
    el.addEventListener('click', () => selectProject(el.dataset.path));
  });
}

// ── Project Detail ───────────────────────────────────────
async function selectProject(projectPath) {
  activeProjectPath = projectPath;
  // Re-render sidebar to update active state
  filterProjects();

  const project = allProjects.find(p => p.path === projectPath);
  if (!project) return;

  document.getElementById('welcome').style.display = 'none';
  const detail = document.getElementById('detail');
  detail.style.display = 'flex';
  detail.innerHTML = renderDetailLoading(project);

  // Load snapshot if InterAgent DB exists
  let snapshot = null;
  if (project.signals.hasInterAgentDb) {
    try {
      const enc = encodeURIComponent(projectPath);
      snapshot = await fetch(`${API}/projects/${enc}/snapshot`).then(r => r.json());
      if (snapshot.error) snapshot = null;
    } catch { snapshot = null; }
  }

  detail.innerHTML = renderDetail(project, snapshot);
}

function renderDetailLoading(project) {
  return `
  <div class="detail-header">
    <div class="detail-title-group">
      <div class="detail-name">${esc(project.name)}</div>
      <div class="detail-path">${esc(project.path)}</div>
      <div class="detail-signals" style="margin-top:8px">${signalChips(project.signals)}</div>
    </div>
  </div>
  <div style="color:var(--dim);font-size:12px">Loading project data…</div>`;
}

function mcpIcon(name) {
  const n = name.toLowerCase();
  if (n.includes('interagent') || n.includes('broker')) return '⛓';
  if (n.includes('github') || n.includes('git')) return '';
  if (n.includes('slack')) return '💬';
  if (n.includes('linear')) return '◈';
  if (n.includes('jira')) return '◉';
  if (n.includes('supabase') || n.includes('postgres') || n.includes('database') || n.includes('db')) return '🗄';
  if (n.includes('fs') || n.includes('file') || n.includes('filesystem')) return '📁';
  if (n.includes('search') || n.includes('brave')) return '🔍';
  if (n.includes('memory') || n.includes('mem')) return '🧠';
  return '⚙';
}

function renderMcpSection(mcpConfig) {
  if (!mcpConfig?.mcpServers) return '';
  const servers = Object.entries(mcpConfig.mcpServers);
  if (!servers.length) return '';

  const cards = servers.map(([name, cfg]) => {
    const cmd = [cfg.command, ...(cfg.args || [])].join(' ');
    return `
    <div class="mcp-card">
      <div class="mcp-card-top">
        <div class="mcp-icon">${mcpIcon(name)}</div>
        <div>
          <div class="mcp-server-name">${esc(name)}</div>
          <div class="mcp-server-sub">MCP Server</div>
        </div>
      </div>
      <div class="mcp-command">
        <span class="cmd-label">$</span>
        <span>${esc(cmd)}</span>
      </div>
    </div>`;
  }).join('');

  return `
  <div>
    <div class="section-title">MCP Servers (${servers.length})</div>
    <div class="mcp-grid">${cards}</div>
  </div>`;
}

function renderStats(snapshot) {
  if (!snapshot) return '';
  const s = snapshot.tasksByStatus || {};
  const memoBlockers = (snapshot.memos || []).filter(m => m.urgency === 'blocker').length;
  return `
  <div>
    <div class="section-title">Agent Activity</div>
    <div class="stats-grid">
      <div class="stat-card stat-pending">
        <div class="stat-label">Pending</div>
        <div class="stat-value">${s.pending || 0}</div>
      </div>
      <div class="stat-card stat-inprogress">
        <div class="stat-label">In Progress</div>
        <div class="stat-value">${s['in-progress'] || 0}</div>
      </div>
      <div class="stat-card stat-done">
        <div class="stat-label">Done</div>
        <div class="stat-value">${s.done || 0}</div>
      </div>
      <div class="stat-card stat-memories">
        <div class="stat-label">Memories</div>
        <div class="stat-value">${(snapshot.memories || []).length}</div>
      </div>
      <div class="stat-card stat-blockers">
        <div class="stat-label">Blockers</div>
        <div class="stat-value">${memoBlockers}</div>
      </div>
    </div>
  </div>`;
}

function renderTasks(tasks) {
  if (!tasks?.length) return `<div class="empty-state">No tasks yet.</div>`;
  return tasks.slice(0,8).map(t => {
    const cls = t.status === 'pending' ? 'is-task-pending' : t.status === 'in-progress' ? 'is-task-active' : t.status === 'done' ? 'is-task-done' : '';
    const badgeCls = { pending:'badge-pending', 'in-progress':'badge-active', done:'badge-done', failed:'badge-failed', abandoned:'badge-abandoned' }[t.status] || '';
    return `
    <div class="list-item ${cls}">
      <div class="li-meta">
        <span class="li-badge ${badgeCls}">${t.status}</span>
        ${t.assigned_agent ? `<span>${esc(t.assigned_agent)}</span>` : ''}
        <span>${fmt(t.updated_at)}</span>
      </div>
      <div class="li-title">${esc(t.title)}</div>
      ${t.reasoning ? `<div class="li-sub">${esc(t.reasoning)}</div>` : ''}
    </div>`;
  }).join('');
}

function renderMemos(memos) {
  if (!memos?.length) return `<div class="empty-state">No memos from agents.</div>`;
  return memos.map(m => {
    const cls = m.urgency === 'blocker' ? 'is-blocker' : m.urgency === 'warning' ? 'is-warning' : 'is-info';
    const badgeCls = { blocker:'badge-blocker', warning:'badge-warning', info:'badge-info' }[m.urgency] || '';
    return `
    <div class="list-item ${cls}">
      <div class="li-meta">
        <span class="li-badge ${badgeCls}">${m.urgency}</span>
        <span>${esc(m.author)}</span>
        <span>${fmt(m.created)}</span>
      </div>
      <div class="li-title" style="white-space:pre-wrap">${esc(m.message)}</div>
    </div>`;
  }).join('');
}

function renderMemories(memories) {
  if (!memories?.length) return `<div class="empty-state">No memories stored.</div>`;
  return memories.slice(0,8).map(m => {
    const tags = m.tags ? JSON.parse(m.tags) : [];
    const isMemo = tags.includes('memo');
    if (isMemo) return '';
    const isDecision = tags.includes('decision');
    return `
    <div class="list-item ${isDecision ? 'is-decision' : ''}">
      <div class="li-title">${esc(m.key)}</div>
      <div class="li-sub">${esc(m.content)}</div>
      ${tags.length ? `<div class="tags-row">${tags.map(t => `<span class="tag">${esc(t)}</span>`).join('')}</div>` : ''}
      <div class="li-meta"><span>${esc(m.agent_name)}</span><span>${fmt(m.updated_at)}</span></div>
    </div>`;
  }).filter(Boolean).join('') || `<div class="empty-state">No memories stored.</div>`;
}

function renderActivity(events) {
  if (!events?.length) return `<div class="empty-state">No activity yet.</div>`;
  return `<div style="padding: 4px 0">` +
    events.map(e => `
    <div class="activity-item">
      <div class="activity-dot"></div>
      <div style="flex:1">
        <div class="activity-text">${esc(e.event_description)}</div>
        <div class="activity-meta">${esc(e.agent_name)} · ${fmt(e.created_at)}</div>
      </div>
    </div>`).join('') + `</div>`;
}

function renderNoData(project) {
  const has = project.signals;
  let msg = '';
  if (!has.hasInterAgentDb) {
    msg = `<p>This project has been set up for AI tools but hasn't been connected to InterAgent yet.</p>
      <p style="margin-top:8px">To start tracking agent activity, add <code style="background:rgba(255,255,255,0.05);padding:2px 6px;border-radius:4px;font-family:monospace">.mcp.json</code> pointing to <code style="background:rgba(255,255,255,0.05);padding:2px 6px;border-radius:4px;font-family:monospace">interagent mcp</code> and start a session.</p>`;
  }
  return `<div style="background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:18px;color:var(--text-2);font-size:12px;line-height:1.7">${msg}</div>`;
}

function renderDetail(project, snapshot) {
  const mcp = renderMcpSection(project.mcpConfig);
  const stats = renderStats(snapshot);

  let body = '';
  if (snapshot) {
    body = `
    ${stats}
    <div class="two-col">
      <div>
        <div class="section-title">Tasks (${(snapshot.tasks||[]).length})</div>
        <div class="item-list">${renderTasks(snapshot.tasks)}</div>
      </div>
      <div>
        <div class="section-title">Memos (${(snapshot.memos||[]).length})</div>
        <div class="item-list">${renderMemos(snapshot.memos)}</div>
      </div>
    </div>
    <div class="two-col">
      <div>
        <div class="section-title">Knowledge & Decisions (${(snapshot.memories||[]).length})</div>
        <div class="item-list">${renderMemories(snapshot.memories)}</div>
      </div>
      <div>
        <div class="section-title">Recent Activity</div>
        ${renderActivity(snapshot.events)}
      </div>
    </div>`;
  } else {
    body = renderNoData(project);
  }

  return `
  <div class="detail-header">
    <div class="detail-title-group">
      <div class="detail-name">${esc(project.name)}</div>
      <div class="detail-path">${esc(project.path)}</div>
      <div class="detail-signals">${signalChips(project.signals)}</div>
    </div>
  </div>
  ${mcp}
  ${body}`;
}

// ── Boot ─────────────────────────────────────────────────
loadProjects();
</script>
</body>
</html>
