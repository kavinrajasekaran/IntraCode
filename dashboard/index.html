<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>InterAgent — Shared Brain for AI Agents</title>
  <meta name="description" content="InterAgent Broker Dashboard — Monitor and manage your multi-agent coordination layer.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #08080f;
      --surface: #111120;
      --card: #181830;
      --card-hover: #1f1f40;
      --border: #252545;
      --border-hover: #3a3a60;
      --accent: #7c6af7;
      --accent-soft: rgba(124, 106, 247, 0.12);
      --accent-hover: #6d5de8;
      --accent-glow: rgba(124, 106, 247, 0.25);
      --text: #e8eaf0;
      --text-secondary: #9ca3c0;
      --dim: #5b6480;
      --c-pending: #6366f1;
      --c-progress: #f59e0b;
      --c-done: #22c55e;
      --c-failed: #ef4444;
      --c-aband: #64748b;
      --c-info: #3b82f6;
      --radius: 12px;
      --radius-sm: 8px;
      --shadow: 0 4px 24px rgba(0,0,0,0.4);
      --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }

    html, body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
      font-size: 13px;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ── Layout ───────────────────────────────────────────── */
    .app {
      display: grid;
      grid-template-rows: auto 1fr auto;
      height: 100vh;
    }

    /* ── Header ───────────────────────────────────────────── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 24px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(12px);
      gap: 16px;
      z-index: 10;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .logo {
      font-size: 17px;
      font-weight: 800;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #7c6af7 0%, #a78bfa 50%, #c4b5fd 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .logo-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 32px;
      border-radius: 10px;
      background: linear-gradient(135deg, rgba(124,106,247,0.2) 0%, rgba(167,139,250,0.1) 100%);
      border: 1px solid rgba(124,106,247,0.25);
      font-size: 16px;
      margin-right: 2px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.02em;
      transition: var(--transition);
    }

    .badge.on  {
      background: rgba(34,197,94,0.1);
      color: #4ade80;
      border: 1px solid rgba(34,197,94,0.2);
    }
    .badge.off {
      background: rgba(239,68,68,0.1);
      color: #f87171;
      border: 1px solid rgba(239,68,68,0.2);
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: currentColor;
    }
    .badge.on .dot {
      animation: pulse 2s ease-in-out infinite;
      box-shadow: 0 0 6px currentColor;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.85); }
    }

    .header-right {
      display: flex;
      gap: 8px;
    }

    /* ── Buttons ──────────────────────────────────────────── */
    .btn {
      padding: 8px 16px;
      border-radius: var(--radius-sm);
      border: none;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      font-family: inherit;
      transition: var(--transition);
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .btn:active { transform: scale(0.97); }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-hover) 100%);
      color: #fff;
      box-shadow: 0 2px 12px var(--accent-glow);
    }
    .btn-primary:hover {
      background: linear-gradient(135deg, var(--accent-hover) 0%, #5d4bc7 100%);
      box-shadow: 0 4px 20px var(--accent-glow);
      transform: translateY(-1px);
    }

    .btn-ghost {
      background: rgba(255,255,255,0.04);
      color: var(--text-secondary);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover {
      background: rgba(255,255,255,0.08);
      border-color: var(--border-hover);
      color: var(--text);
    }

    .btn-sm { padding: 5px 11px; font-size: 11px; border-radius: 6px; }

    /* ── Kanban ────────────────────────────────────────────── */
    .kanban-wrap {
      overflow-x: auto;
      overflow-y: hidden;
      padding: 20px 24px;
      min-height: 0;
    }
    .kanban-wrap::-webkit-scrollbar { height: 4px; }
    .kanban-wrap::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .kanban {
      display: flex;
      gap: 14px;
      height: 100%;
      min-width: fit-content;
    }

    .col {
      width: 260px;
      flex-shrink: 0;
      background: var(--surface);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: var(--transition);
    }
    .col:hover { border-color: var(--border-hover); }

    .col-head {
      padding: 10px 14px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .col[data-s="pending"]     .col-head { color: var(--c-pending);  background: rgba(99,102,241,0.08); }
    .col[data-s="in-progress"] .col-head { color: var(--c-progress); background: rgba(245,158,11,0.08); }
    .col[data-s="done"]        .col-head { color: var(--c-done);     background: rgba(34,197,94,0.08);  }
    .col[data-s="failed"]      .col-head { color: var(--c-failed);   background: rgba(239,68,68,0.08);  }
    .col[data-s="abandoned"]   .col-head { color: var(--c-aband);    background: rgba(100,116,139,0.08);}

    .cnt {
      background: rgba(255,255,255,0.08);
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 10px;
      font-weight: 600;
    }

    .cards {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .cards::-webkit-scrollbar { width: 3px; }
    .cards::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    .card {
      background: var(--card);
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      padding: 12px 13px;
      cursor: default;
      transition: var(--transition);
    }
    .card:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow);
      border-color: var(--border-hover);
      background: var(--card-hover);
    }

    .card-id {
      font-size: 10px;
      color: var(--dim);
      margin-bottom: 5px;
      font-weight: 600;
    }
    .card-title {
      font-weight: 500;
      line-height: 1.45;
      margin-bottom: 6px;
      font-size: 13px;
    }
    .card-agent {
      font-size: 11px;
      color: var(--accent);
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .card-agent::before {
      content: '';
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      opacity: 0.6;
    }
    .card-date {
      font-size: 10px;
      color: var(--dim);
      margin-bottom: 8px;
    }
    .card-btns { display: flex; gap: 5px; flex-wrap: wrap; }

    .b-claim {
      background: rgba(99,102,241,0.15);
      color: #818cf8;
      border: 1px solid rgba(99,102,241,0.2);
    }
    .b-claim:hover {
      background: rgba(99,102,241,0.25);
      border-color: rgba(99,102,241,0.4);
    }
    .b-update {
      background: rgba(245,158,11,0.12);
      color: #fbbf24;
      border: 1px solid rgba(245,158,11,0.2);
    }
    .b-update:hover {
      background: rgba(245,158,11,0.25);
      border-color: rgba(245,158,11,0.4);
    }

    .empty {
      text-align: center;
      padding: 28px 12px;
      color: var(--dim);
      font-size: 12px;
    }

    /* ── Bottom Panel ──────────────────────────────────────── */
    .bottom {
      flex-shrink: 0;
      height: 240px;
      border-top: 1px solid var(--border);
      background: var(--surface);
      display: flex;
      flex-direction: column;
    }

    .tab-bar {
      display: flex;
      border-bottom: 1px solid var(--border);
      padding: 0 20px;
      flex-shrink: 0;
      gap: 2px;
    }
    .tab {
      padding: 9px 16px;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--dim);
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      font-family: inherit;
      transition: var(--transition);
      position: relative;
    }
    .tab:hover { color: var(--text-secondary); }
    .tab.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }

    .tab-content {
      display: none;
      overflow-y: auto;
      padding: 12px 20px;
      flex: 1;
      flex-direction: column;
      gap: 8px;
    }
    .tab-content.active { display: flex; }
    .tab-content::-webkit-scrollbar { width: 3px; }
    .tab-content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* Search */
    .search-row { display: flex; gap: 8px; flex-shrink: 0; margin-bottom: 4px; }

    input[type="text"], input[type="number"], textarea, select {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 8px 12px;
      color: var(--text);
      font-size: 12px;
      outline: none;
      font-family: inherit;
      transition: var(--transition);
      width: 100%;
    }
    input:focus, textarea:focus, select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-soft);
    }
    input::placeholder, textarea::placeholder {
      color: var(--dim);
    }
    textarea { resize: vertical; min-height: 60px; }

    /* Items */
    .item {
      background: var(--card);
      border-radius: var(--radius-sm);
      padding: 11px 13px;
      font-size: 12px;
      border-left: 3px solid var(--border);
      transition: var(--transition);
    }
    .item:hover {
      background: var(--card-hover);
    }
    .item.fail { border-left-color: var(--c-failed); }
    .item.art  { border-left-color: var(--accent); }
    .item.mem  { border-left-color: var(--c-pending); }
    .item.generic-mem { border-left-color: var(--c-progress); }

    .item-title { font-weight: 600; margin-bottom: 4px; line-height: 1.4; }
    .item-sub   { color: var(--text-secondary); font-size: 11px; margin-top: 3px; line-height: 1.5; }
    .item-path  { color: var(--dim); font-family: 'SF Mono', Monaco, 'Fira Code', monospace; font-size: 10px; margin-top: 3px; }
    .item-meta  { color: var(--dim); font-size: 10px; margin-top: 5px; display: flex; align-items: center; gap: 6px; }

    .tags-row { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 5px; }
    .tag {
      padding: 2px 8px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 4px;
      font-size: 10px;
      color: var(--text-secondary);
      font-weight: 500;
    }

    /* ── Urgency Colors ────────────────────────────────────── */
    .urgency-blocker { color: var(--c-failed); }
    .urgency-warning { color: var(--c-progress); }
    .urgency-info    { color: var(--c-info); }

    .urgency-bar-blocker { border-left-color: var(--c-failed) !important; }
    .urgency-bar-warning { border-left-color: var(--c-progress) !important; }
    .urgency-bar-info    { border-left-color: var(--c-info) !important; }

    /* ── Modal ────────────────────────────────────────────── */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(6px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      animation: fadeIn 0.15s ease;
    }
    .overlay.hidden { display: none; }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(12px) scale(0.98); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px 28px;
      width: 420px;
      max-width: 92vw;
      box-shadow: 0 12px 48px rgba(0,0,0,0.5);
      animation: slideUp 0.2s ease;
    }
    .modal h3 {
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 18px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 14px;
    }
    .field label {
      font-size: 11px;
      font-weight: 600;
      color: var(--dim);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .modal-btns {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 8px;
    }

    /* ── Toast ────────────────────────────────────────────── */
    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 12px 18px;
      font-size: 12px;
      font-weight: 500;
      z-index: 200;
      opacity: 0;
      transform: translateY(8px);
      transition: all 0.3s ease;
      max-width: 340px;
      line-height: 1.4;
      box-shadow: var(--shadow);
    }
    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }
    .toast.err { border-left: 3px solid var(--c-failed); }
    .toast.ok  { border-left: 3px solid var(--c-done); }

    /* ── Stat Cards ──────────────────────────────────────── */
    .stats-row {
      display: flex;
      gap: 10px;
      padding: 0 24px 6px;
      flex-shrink: 0;
    }
    .stat-card {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 10px 14px;
      display: flex;
      flex-direction: column;
      gap: 2px;
      transition: var(--transition);
    }
    .stat-card:hover {
      border-color: var(--border-hover);
    }
    .stat-label {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--dim);
    }
    .stat-value {
      font-size: 22px;
      font-weight: 700;
    }
    .stat-pending  .stat-value { color: var(--c-pending); }
    .stat-active   .stat-value { color: var(--c-progress); }
    .stat-done     .stat-value { color: var(--c-done); }
    .stat-memories .stat-value { color: var(--accent); }

    /* ── Responsive ──────────────────────────────────────── */
    @media (max-width: 768px) {
      .stats-row { display: grid; grid-template-columns: 1fr 1fr; }
      .col { width: 220px; }
      header { padding: 10px 16px; }
      .kanban-wrap { padding: 14px 16px; }
    }
  </style>
</head>
<body>

<div class="app">

  <!-- Header -->
  <header>
    <div class="header-left">
      <span class="logo-icon">⛓</span>
      <span class="logo">InterAgent</span>
      <span id="statusBadge" class="badge off"><span class="dot"></span><span id="statusText">Connecting…</span></span>
    </div>
    <div class="header-right">
      <button class="btn btn-primary" onclick="openModal('newTask')">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M6 1v10M1 6h10" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        New Task
      </button>
      <button class="btn btn-ghost" onclick="refresh()">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M1 6a5 5 0 019.25-2.63M11 6a5 5 0 01-9.25 2.63" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M10.25 1v2.37h-2.37M1.75 11V8.63h2.37" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Refresh
      </button>
    </div>
  </header>

  <!-- Stats -->
  <div class="stats-row" id="statsRow">
    <div class="stat-card stat-pending">
      <span class="stat-label">Pending</span>
      <span class="stat-value" id="stat-pending">0</span>
    </div>
    <div class="stat-card stat-active">
      <span class="stat-label">In Progress</span>
      <span class="stat-value" id="stat-active">0</span>
    </div>
    <div class="stat-card stat-done">
      <span class="stat-label">Completed</span>
      <span class="stat-value" id="stat-done">0</span>
    </div>
    <div class="stat-card stat-memories">
      <span class="stat-label">Memories</span>
      <span class="stat-value" id="stat-memories">0</span>
    </div>
  </div>

  <!-- Kanban -->
  <div class="kanban-wrap">
    <div class="kanban">
      <div class="col" data-s="pending">
        <div class="col-head">Pending<span class="cnt" id="cnt-pending">0</span></div>
        <div class="cards" id="col-pending"></div>
      </div>
      <div class="col" data-s="in-progress">
        <div class="col-head">In Progress<span class="cnt" id="cnt-in-progress">0</span></div>
        <div class="cards" id="col-in-progress"></div>
      </div>
      <div class="col" data-s="done">
        <div class="col-head">Done<span class="cnt" id="cnt-done">0</span></div>
        <div class="cards" id="col-done"></div>
      </div>
      <div class="col" data-s="failed">
        <div class="col-head">Failed<span class="cnt" id="cnt-failed">0</span></div>
        <div class="cards" id="col-failed"></div>
      </div>
      <div class="col" data-s="abandoned">
        <div class="col-head">Abandoned<span class="cnt" id="cnt-abandoned">0</span></div>
        <div class="cards" id="col-abandoned"></div>
      </div>
    </div>
  </div>

  <!-- Bottom Tabs -->
  <div class="bottom">
    <div class="tab-bar">
      <button class="tab active" onclick="showTab('memos')">Memos</button>
      <button class="tab" onclick="showTab('failures')">Failures</button>
      <button class="tab" onclick="showTab('artifacts')">Artifacts</button>
      <button class="tab" onclick="showTab('generic-memories')">Memories</button>
      <button class="tab" onclick="showTab('memory')">Activity</button>
    </div>
    <div id="tab-memos" class="tab-content active">
      <div id="memoList"></div>
    </div>
    <div id="tab-failures" class="tab-content">
      <div class="search-row">
        <input id="failQ" type="text" placeholder="Search past failures…" onkeydown="if(event.key==='Enter')searchFail()">
        <button class="btn btn-ghost btn-sm" onclick="searchFail()">Search</button>
        <button class="btn btn-ghost btn-sm" onclick="loadFail()">All</button>
      </div>
      <div id="failList"></div>
    </div>
    <div id="tab-artifacts" class="tab-content">
      <div id="artList"></div>
    </div>
    <div id="tab-generic-memories" class="tab-content">
      <div class="search-row">
        <input id="memQ" type="text" placeholder="Search knowledge, decisions, rules…" onkeydown="if(event.key==='Enter')searchMemories()">
        <button class="btn btn-ghost btn-sm" onclick="searchMemories()">Search</button>
        <button class="btn btn-ghost btn-sm" onclick="loadMemories()">All</button>
      </div>
      <div id="genericMemList"></div>
    </div>
    <div id="tab-memory" class="tab-content">
      <div id="memList"></div>
    </div>
  </div>
</div>

<!-- New Task Modal -->
<div id="overlay-newTask" class="overlay hidden" onclick="closeModal('newTask',event)">
  <div class="modal" onclick="event.stopPropagation()">
    <h3>
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M8 1v14M1 8h14" stroke="var(--accent)" stroke-width="2" stroke-linecap="round"/></svg>
      Create New Task
    </h3>
    <div class="field"><label>Title</label><input id="nt-title" type="text" placeholder="What needs to be done?"></div>
    <div class="field"><label>Reasoning (optional)</label><textarea id="nt-reason" placeholder="Why is this task needed?"></textarea></div>
    <div class="modal-btns">
      <button class="btn btn-ghost" onclick="closeModal('newTask')">Cancel</button>
      <button class="btn btn-primary" onclick="createTask()">Create Task</button>
    </div>
  </div>
</div>

<!-- Claim Task Modal -->
<div id="overlay-claim" class="overlay hidden" onclick="closeModal('claim',event)">
  <div class="modal" onclick="event.stopPropagation()">
    <h3>Claim Task <span id="claim-id" style="color:var(--dim)"></span></h3>
    <div class="field"><label>Your Agent Name</label><input id="claim-agent" type="text" placeholder="e.g. Cursor, Windsurf, Antigravity"></div>
    <div class="modal-btns">
      <button class="btn btn-ghost" onclick="closeModal('claim')">Cancel</button>
      <button class="btn btn-primary" onclick="submitClaim()">Claim Task</button>
    </div>
  </div>
</div>

<!-- Update Task Modal -->
<div id="overlay-update" class="overlay hidden" onclick="closeModal('update',event)">
  <div class="modal" onclick="event.stopPropagation()">
    <h3>Update Task <span id="update-id" style="color:var(--dim)"></span></h3>
    <div class="field"><label>Agent Name</label><input id="upd-agent" type="text" placeholder="e.g. Cursor"></div>
    <div class="field">
      <label>New Status</label>
      <select id="upd-status">
        <option value="pending">Pending</option>
        <option value="in-progress">In Progress</option>
        <option value="done">Done</option>
        <option value="failed">Failed</option>
        <option value="abandoned">Abandoned</option>
      </select>
    </div>
    <div class="field"><label>Notes (optional)</label><textarea id="upd-notes" placeholder="What happened?"></textarea></div>
    <div class="modal-btns">
      <button class="btn btn-ghost" onclick="closeModal('update')">Cancel</button>
      <button class="btn btn-primary" onclick="submitUpdate()">Update</button>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
  // Use relative API path so it works on any port
  const API = window.location.origin + '/api';
  let claimTaskId = null;
  let updateTaskId = null;

  // ── Fetch helpers ──────────────────────────────────────
  async function get(path) {
    const r = await fetch(API + path);
    return r.json();
  }
  async function post(path, body) {
    const r = await fetch(API + path, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    return r.json();
  }

  // ── Toast ──────────────────────────────────────────────
  let toastTimer;
  function toast(msg, ok = true) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = 'toast show ' + (ok ? 'ok' : 'err');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.className = 'toast', 3500);
  }

  // ── Status ─────────────────────────────────────────────
  function setOnline(online) {
    const b = document.getElementById('statusBadge');
    const t = document.getElementById('statusText');
    if (online) {
      b.className = 'badge on';
      t.textContent = 'Running';
    } else {
      b.className = 'badge off';
      t.textContent = 'Offline';
    }
  }

  async function checkHealth() {
    try {
      await get('/health');
      setOnline(true);
      return true;
    } catch {
      setOnline(false);
      return false;
    }
  }

  // ── Date format ───────────────────────────────────────
  function fmt(dt) {
    if (!dt) return '';
    const iso = dt.replace(' ', 'T') + (dt.endsWith('Z') ? '' : 'Z');
    return new Date(iso).toLocaleDateString(undefined, {
      month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit'
    });
  }

  function esc(s) {
    return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // ── Stats ─────────────────────────────────────────────
  function updateStats(tasks) {
    const pending = tasks.filter(t => t.status === 'pending').length;
    const active = tasks.filter(t => t.status === 'in-progress').length;
    const done = tasks.filter(t => t.status === 'done').length;
    document.getElementById('stat-pending').textContent = pending;
    document.getElementById('stat-active').textContent = active;
    document.getElementById('stat-done').textContent = done;
  }

  async function updateMemoryCount() {
    try {
      const d = await get('/memories');
      document.getElementById('stat-memories').textContent = (d.memories ?? []).length;
    } catch {}
  }

  // ── Kanban ─────────────────────────────────────────────
  function renderKanban(tasks) {
    const cols = { 'pending': [], 'in-progress': [], 'done': [], 'failed': [], 'abandoned': [] };
    tasks.forEach(t => (cols[t.status] ?? cols['abandoned']).push(t));
    updateStats(tasks);

    for (const [status, items] of Object.entries(cols)) {
      document.getElementById('cnt-' + status).textContent = items.length;
      const el = document.getElementById('col-' + status);
      if (!items.length) { el.innerHTML = '<div class="empty">No tasks</div>'; continue; }
      el.innerHTML = items.map(t => `
        <div class="card">
          <div class="card-id">#${t.id}</div>
          <div class="card-title">${esc(t.title)}</div>
          ${t.assigned_agent ? `<div class="card-agent">${esc(t.assigned_agent)}</div>` : ''}
          <div class="card-date">${fmt(t.created_at)}</div>
          <div class="card-btns">
            ${status === 'pending' ? `<button class="btn btn-sm b-claim" onclick="openClaim(${t.id})">Claim</button>` : ''}
            <button class="btn btn-sm b-update" onclick="openUpdate(${t.id}, '${status}')">Update</button>
          </div>
        </div>`).join('');
    }
  }

  // ── Bottom tabs ────────────────────────────────────────
  function showTab(name) {
    document.querySelectorAll('.tab').forEach((t, i) => {
      const names = ['memos', 'failures', 'artifacts', 'generic-memories', 'memory'];
      t.classList.toggle('active', names[i] === name);
    });
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    document.getElementById('tab-' + name).classList.add('active');
    if (name === 'memos')     loadMemos();
    if (name === 'artifacts') loadArtifacts();
    if (name === 'memory')    loadMemory();
    if (name === 'failures')  loadFail();
    if (name === 'generic-memories') loadMemories();
  }

  async function loadMemos() {
    try {
      const d = await get('/memos');
      const el = document.getElementById('memoList');
      const items = d.memos ?? [];
      if (!items.length) { el.innerHTML = '<div class="empty">No memos left by agents yet.</div>'; return; }
      el.innerHTML = items.map(m => `
        <div class="item mem urgency-bar-${m.urgency}">
          <div class="item-title" style="white-space:pre-wrap">${esc(m.message)}</div>
          <div class="item-meta">
            <span class="urgency-${m.urgency}" style="text-transform:uppercase;font-weight:700;font-size:9px;letter-spacing:0.05em">[${m.urgency}]</span>
            <span>${esc(m.author)}</span>
            <span>${fmt(m.created)}</span>
          </div>
        </div>`).join('');
    } catch {}
  }

  function renderFail(items) {
    const el = document.getElementById('failList');
    if (!items.length) { el.innerHTML = '<div class="empty">No failures logged.</div>'; return; }
    el.innerHTML = items.map(f => `
      <div class="item fail">
        <div class="item-title">${esc(f.approach)}</div>
        <div class="item-sub">${esc(f.reason)}</div>
        <div class="item-meta">
          <span>${esc(f.agent_name)}</span>
          <span>${fmt(f.created_at)}</span>
        </div>
      </div>`).join('');
  }

  async function loadFail() {
    try {
      const d = await get('/failures');
      renderFail(d.failures ?? []);
    } catch {}
  }

  async function searchFail() {
    const q = document.getElementById('failQ').value.trim();
    if (!q) { loadFail(); return; }
    try {
      const d = await post('/failures/check', { query: q });
      renderFail(d.results ?? []);
    } catch {}
  }

  async function loadArtifacts() {
    try {
      const d = await get('/artifacts');
      const el = document.getElementById('artList');
      const items = d.artifacts ?? [];
      if (!items.length) { el.innerHTML = '<div class="empty">No artifacts registered.</div>'; return; }
      el.innerHTML = items.map(a => `
        <div class="item art">
          <div class="item-title">${esc(a.name)}</div>
          <div class="item-path">${esc(a.path)}</div>
          <div class="item-sub">${esc(a.description)}</div>
          <div class="item-meta">
            <span>${esc(a.agent_name)}</span>
            <span>${fmt(a.created_at)}</span>
          </div>
        </div>`).join('');
    } catch {}
  }

  async function loadMemory() {
    try {
      const d = await get('/working-memory');
      const el = document.getElementById('memList');
      const items = d.events ?? [];
      if (!items.length) { el.innerHTML = '<div class="empty">No activity yet.</div>'; return; }
      el.innerHTML = items.map(m => `
        <div class="item mem">
          <div class="item-title">${esc(m.event_description)}</div>
          <div class="item-meta">
            <span>${esc(m.agent_name)}</span>
            <span>${fmt(m.created_at)}</span>
          </div>
        </div>`).join('');
    } catch {}
  }

  function renderMemories(items) {
    const el = document.getElementById('genericMemList');
    if (!items.length) { el.innerHTML = '<div class="empty">No memories stored.</div>'; return; }
    el.innerHTML = items.map(m => {
      const tags = m.tags ? JSON.parse(m.tags) : [];
      return `
      <div class="item generic-mem">
        <div class="item-title">${esc(m.key)}</div>
        <div class="item-sub" style="white-space:pre-wrap">${esc(m.content)}</div>
        ${tags.length ? `<div class="tags-row">${tags.map(t => `<span class="tag">${esc(t)}</span>`).join('')}</div>` : ''}
        <div class="item-meta">
          <span>${esc(m.agent_name)}</span>
          <span>updated ${fmt(m.updated_at)}</span>
        </div>
      </div>`;
    }).join('');
  }

  async function loadMemories() {
    try {
      const d = await get('/memories');
      renderMemories(d.memories ?? []);
    } catch {}
  }

  async function searchMemories() {
    const q = document.getElementById('memQ').value.trim();
    if (!q) { loadMemories(); return; }
    try {
      const d = await post('/memories/search', { query: q });
      renderMemories(d.results ?? []);
    } catch {}
  }

  // ── Modals ─────────────────────────────────────────────
  function openModal(name) {
    document.getElementById('overlay-' + name).classList.remove('hidden');
  }
  function closeModal(name, evt) {
    if (evt && evt.target !== document.getElementById('overlay-' + name)) return;
    document.getElementById('overlay-' + name).classList.add('hidden');
  }

  async function createTask() {
    const title  = document.getElementById('nt-title').value.trim();
    const reason = document.getElementById('nt-reason').value.trim();
    if (!title) { toast('Title is required.', false); return; }
    const d = await post('/tasks/create', { title, reasoning: reason || undefined });
    if (d.error) { toast(d.error, false); return; }
    toast(`Task #${d.task.id} created.`);
    document.getElementById('nt-title').value = '';
    document.getElementById('nt-reason').value = '';
    closeModal('newTask');
    refresh();
  }

  function openClaim(id) {
    claimTaskId = id;
    document.getElementById('claim-id').textContent = '#' + id;
    document.getElementById('claim-agent').value = '';
    openModal('claim');
  }
  async function submitClaim() {
    const agent_name = document.getElementById('claim-agent').value.trim();
    if (!agent_name) { toast('Agent name required.', false); return; }
    const d = await post('/tasks/claim', { task_id: claimTaskId, agent_name });
    if (d.error) { toast(d.error, false); return; }
    toast(`Task #${claimTaskId} claimed by ${agent_name}.`);
    closeModal('claim');
    refresh();
  }

  function openUpdate(id, status) {
    updateTaskId = id;
    document.getElementById('update-id').textContent = '#' + id;
    document.getElementById('upd-status').value = status;
    document.getElementById('upd-agent').value = '';
    document.getElementById('upd-notes').value = '';
    openModal('update');
  }
  async function submitUpdate() {
    const agent_name = document.getElementById('upd-agent').value.trim();
    const status     = document.getElementById('upd-status').value;
    const notes      = document.getElementById('upd-notes').value.trim();
    if (!agent_name) { toast('Agent name required.', false); return; }
    const d = await post('/tasks/update', { task_id: updateTaskId, status, agent_name, notes: notes || undefined });
    if (d.error) { toast(d.error, false); return; }
    toast(`Task #${updateTaskId} → ${status}`);
    closeModal('update');
    refresh();
  }

  // ── Refresh ────────────────────────────────────────────
  async function refresh() {
    const online = await checkHealth();
    if (!online) return;
    try {
      const d = await get('/tasks');
      renderKanban(d.tasks ?? []);
      updateMemoryCount();
      // Load current active tab
      const activeTab = document.querySelector('.tab.active');
      if (activeTab) {
        const tabName = activeTab.textContent.toLowerCase();
        if (tabName === 'memos') loadMemos();
        else if (tabName === 'failures') loadFail();
        else if (tabName === 'artifacts') loadArtifacts();
        else if (tabName === 'memories') loadMemories();
        else if (tabName === 'activity') loadMemory();
      }
    } catch {}
  }

  // ── Boot ───────────────────────────────────────────────
  refresh();
  setInterval(refresh, 6000);
</script>

</body>
</html>
