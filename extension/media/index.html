<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'none'; connect-src http://127.0.0.1:API_PORT; style-src 'unsafe-inline'; script-src 'unsafe-inline';">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>InterAgent Broker</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d0d1a; --surface: #16162a; --card: #1e1e38;
      --border: #2a2a48; --accent: #7c6af7; --accent-h: #6d5de8;
      --text: #e2e8f0; --dim: #5b6b8a;
      --c-pending: #6366f1; --c-progress: #f59e0b;
      --c-done: #22c55e; --c-failed: #ef4444; --c-aband: #64748b;
    }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg); color: var(--text); height: 100vh;
      display: flex; flex-direction: column; overflow: hidden; font-size: 13px; }

    /* ── Header ─────────────────────────────────────────── */
    header { display: flex; align-items: center; justify-content: space-between;
      padding: 10px 18px; background: var(--surface);
      border-bottom: 1px solid var(--border); flex-shrink: 0; gap: 12px; }
    .logo { font-size: 15px; font-weight: 700;
      background: linear-gradient(135deg, #7c6af7, #a78bfa);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .badge { display: inline-flex; align-items: center; gap: 5px;
      padding: 2px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; }
    .badge.on  { background: rgba(34,197,94,.15); color: #22c55e; }
    .badge.off { background: rgba(239,68,68,.15);  color: #ef4444; }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: currentColor; }
    .badge.on .dot { animation: blink 2s infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }
    .actions { display: flex; gap: 8px; }
    .btn { padding: 6px 14px; border-radius: 8px; border: none; cursor: pointer;
      font-size: 12px; font-weight: 600; transition: .15s; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: var(--accent-h); transform: translateY(-1px); }
    .btn-ghost  { background: rgba(255,255,255,.06); color: var(--text); border: 1px solid var(--border); }
    .btn-ghost:hover  { background: rgba(255,255,255,.12); }
    .btn-sm { padding: 4px 10px; font-size: 11px; border-radius: 6px; }

    /* ── Kanban ──────────────────────────────────────────── */
    .kanban-wrap { flex: 1; overflow-x: auto; overflow-y: hidden;
      padding: 14px 16px; min-height: 0; }
    .kanban { display: flex; gap: 10px; height: 100%; min-width: fit-content; }
    .col { width: 240px; flex-shrink: 0; background: var(--surface);
      border-radius: 12px; border: 1px solid var(--border);
      display: flex; flex-direction: column; overflow: hidden; }
    .col-head { padding: 8px 12px; font-size: 11px; font-weight: 700;
      letter-spacing: .6px; text-transform: uppercase;
      display: flex; justify-content: space-between; align-items: center; }
    .col[data-s="pending"]     .col-head { color: var(--c-pending);  background: rgba(99,102,241,.1); }
    .col[data-s="in-progress"] .col-head { color: var(--c-progress); background: rgba(245,158,11,.1); }
    .col[data-s="done"]        .col-head { color: var(--c-done);     background: rgba(34,197,94,.1);  }
    .col[data-s="failed"]      .col-head { color: var(--c-failed);   background: rgba(239,68,68,.1);  }
    .col[data-s="abandoned"]   .col-head { color: var(--c-aband);    background: rgba(100,116,139,.1);}
    .cnt { background: rgba(255,255,255,.1); padding: 1px 7px; border-radius: 10px; font-size: 10px; }
    .cards { flex: 1; overflow-y: auto; padding: 8px; display: flex; flex-direction: column; gap: 7px; }
    .cards::-webkit-scrollbar { width: 3px; }
    .cards::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    .card { background: var(--card); border-radius: 10px; border: 1px solid var(--border);
      padding: 10px 11px; cursor: default; transition: .15s;  }
    .card:hover { transform: translateY(-1px); box-shadow: 0 4px 14px rgba(0,0,0,.35); }
    .card-id   { font-size: 10px; color: var(--dim); margin-bottom: 4px; }
    .card-title{ font-weight: 500; line-height: 1.4; margin-bottom: 6px; }
    .card-agent{ font-size: 11px; color: var(--accent); margin-bottom: 5px; }
    .card-date { font-size: 10px; color: var(--dim); margin-bottom: 7px; }
    .card-btns { display: flex; gap: 5px; flex-wrap: wrap; }
    .b-claim  { background: rgba(99,102,241,.2);  color: #818cf8; }
    .b-claim:hover  { background: rgba(99,102,241,.35); }
    .b-update { background: rgba(245,158,11,.2);  color: #fbbf24; }
    .b-update:hover { background: rgba(245,158,11,.35); }
    .empty { text-align: center; padding: 20px 8px; color: var(--dim); font-size: 11px; }

    /* ── Bottom tabs ─────────────────────────────────────── */
    .bottom { flex-shrink: 0; height: 210px; border-top: 1px solid var(--border);
      background: var(--surface); display: flex; flex-direction: column; }
    .tab-bar { display: flex; border-bottom: 1px solid var(--border); padding: 0 14px; flex-shrink: 0; }
    .tab { padding: 7px 14px; background: none; border: none;
      border-bottom: 2px solid transparent; color: var(--dim);
      cursor: pointer; font-size: 12px; font-weight: 600; transition: .15s; }
    .tab:hover { color: var(--text); }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
    .tab-content { display: none; overflow-y: auto; padding: 10px 14px;
      flex: 1; flex-direction: column; gap: 6px; }
    .tab-content.active { display: flex; }
    .tab-content::-webkit-scrollbar { width: 3px; }
    .tab-content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* Search */
    .search-row { display: flex; gap: 7px; flex-shrink: 0; }
    input[type="text"], input[type="number"], textarea, select {
      background: var(--card); border: 1px solid var(--border); border-radius: 7px;
      padding: 6px 10px; color: var(--text); font-size: 12px; outline: none;
      font-family: inherit; transition: border-color .15s; width: 100%; }
    input:focus, textarea:focus, select:focus { border-color: var(--accent); }
    textarea { resize: vertical; min-height: 60px; }

    /* Items */
    .item { background: var(--card); border-radius: 8px; padding: 9px 11px;
      font-size: 12px; border-left: 3px solid var(--border); }
    .item.fail { border-left-color: var(--c-failed); }
    .item.art  { border-left-color: var(--accent); }
    .item.mem  { border-left-color: var(--c-pending); }
    .item.generic-mem { border-left-color: var(--c-progress); }
    .item-title { font-weight: 600; margin-bottom: 3px; }
    .item-sub   { color: var(--dim); font-size: 11px; margin-top: 2px; line-height: 1.4; }
    .item-path  { color: var(--dim); font-family: monospace; font-size: 10px; margin-top: 2px; }
    .item-meta  { color: var(--dim); font-size: 10px; margin-top: 4px; }
    .tags-row   { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 4px; }
    .tag        { padding: 2px 6px; background: rgba(255,255,255,.05); border: 1px solid var(--border); border-radius: 4px; font-size: 9px; color: var(--text); }

    /* ── Modal ───────────────────────────────────────────── */
    .overlay { position: fixed; inset: 0; background: rgba(0,0,0,.65);
      display: flex; align-items: center; justify-content: center; z-index: 100; }
    .overlay.hidden { display: none; }
    .modal { background: var(--surface); border: 1px solid var(--border);
      border-radius: 14px; padding: 22px 24px; width: 400px; max-width: 92vw; }
    .modal h3 { font-size: 14px; font-weight: 700; margin-bottom: 16px; }
    .field { display: flex; flex-direction: column; gap: 5px; margin-bottom: 13px; }
    .field label { font-size: 11px; font-weight: 600; color: var(--dim); text-transform: uppercase; letter-spacing: .4px; }
    .modal-btns { display: flex; justify-content: flex-end; gap: 8px; margin-top: 6px; }
    .toast { position: fixed; bottom: 20px; right: 20px; background: var(--card);
      border: 1px solid var(--border); border-radius: 10px; padding: 10px 16px;
      font-size: 12px; z-index: 200; opacity: 0; transition: opacity .3s;
      max-width: 320px; line-height: 1.4; }
    .toast.show { opacity: 1; }
    .toast.err { border-left: 3px solid var(--c-failed); }
    .toast.ok  { border-left: 3px solid var(--c-done); }
  </style>
</head>
<body>

<!-- Header -->
<header>
  <div style="display:flex;align-items:center;gap:12px">
    <span class="logo">InterAgent Broker</span>
    <span id="statusBadge" class="badge off"><span class="dot"></span><span id="statusText">Connecting…</span></span>
  </div>
  <div class="actions">
    <button class="btn btn-primary btn-sm" onclick="openModal('newTask')">+ New Task</button>
    <button class="btn btn-ghost btn-sm" onclick="refresh()">Refresh</button>
  </div>
</header>

<!-- Kanban -->
<div class="kanban-wrap">
  <div class="kanban">
    <div class="col" data-s="pending">
      <div class="col-head">Pending<span class="cnt" id="cnt-pending">0</span></div>
      <div class="cards" id="col-pending"></div>
    </div>
    <div class="col" data-s="in-progress">
      <div class="col-head">In Progress<span class="cnt" id="cnt-in-progress">0</span></div>
      <div class="cards" id="col-in-progress"></div>
    </div>
    <div class="col" data-s="done">
      <div class="col-head">Done<span class="cnt" id="cnt-done">0</span></div>
      <div class="cards" id="col-done"></div>
    </div>
    <div class="col" data-s="failed">
      <div class="col-head">Failed<span class="cnt" id="cnt-failed">0</span></div>
      <div class="cards" id="col-failed"></div>
    </div>
    <div class="col" data-s="abandoned">
      <div class="col-head">Abandoned<span class="cnt" id="cnt-abandoned">0</span></div>
      <div class="cards" id="col-abandoned"></div>
    </div>
  </div>
</div>

<!-- Bottom Tabs -->
<div class="bottom">
  <div class="tab-bar">
    <button class="tab active" onclick="showTab('memos')">Memos</button>
    <button class="tab" onclick="showTab('failures')">Failures</button>
    <button class="tab" onclick="showTab('artifacts')">Artifacts</button>
    <button class="tab" onclick="showTab('generic-memories')">Memories</button>
    <button class="tab" onclick="showTab('memory')">Working Memory</button>
  </div>
  <div id="tab-memos" class="tab-content active">
    <div id="memoList"></div>
  </div>
  <div id="tab-failures" class="tab-content">
    <div class="search-row">
      <input id="failQ" type="text" placeholder="Full-text search past failures…" onkeydown="if(event.key==='Enter')searchFail()">
      <button class="btn btn-ghost btn-sm" onclick="searchFail()">Search</button>
      <button class="btn btn-ghost btn-sm" onclick="loadFail()">All</button>
    </div>
    <div id="failList"></div>
  </div>
  <div id="tab-artifacts" class="tab-content">
    <div id="artList"></div>
  </div>
  <div id="tab-generic-memories" class="tab-content">
    <div class="search-row">
      <input id="memQ" type="text" placeholder="Search project knowledge, rules, decisions..." onkeydown="if(event.key==='Enter')searchMemories()">
      <button class="btn btn-ghost btn-sm" onclick="searchMemories()">Search</button>
      <button class="btn btn-ghost btn-sm" onclick="loadMemories()">All</button>
    </div>
    <div id="genericMemList"></div>
  </div>
  <div id="tab-memory" class="tab-content">
    <div id="memList"></div>
  </div>
</div>

<!-- New Task Modal -->
<div id="overlay-newTask" class="overlay hidden" onclick="closeModal('newTask',event)">
  <div class="modal" onclick="event.stopPropagation()">
    <h3>Create New Task</h3>
    <div class="field"><label>Title</label><input id="nt-title" type="text" placeholder="What needs to be done?"></div>
    <div class="field"><label>Reasoning (optional)</label><textarea id="nt-reason" placeholder="Why is this task important?"></textarea></div>
    <div class="modal-btns">
      <button class="btn btn-ghost btn-sm" onclick="closeModal('newTask')">Cancel</button>
      <button class="btn btn-primary btn-sm" onclick="createTask()">Create Task</button>
    </div>
  </div>
</div>

<!-- Claim Task Modal -->
<div id="overlay-claim" class="overlay hidden" onclick="closeModal('claim',event)">
  <div class="modal" onclick="event.stopPropagation()">
    <h3>Claim Task <span id="claim-id" style="color:var(--dim)"></span></h3>
    <div class="field"><label>Your Agent Name</label><input id="claim-agent" type="text" placeholder="e.g. Cursor, Windsurf, Antigravity"></div>
    <div class="modal-btns">
      <button class="btn btn-ghost btn-sm" onclick="closeModal('claim')">Cancel</button>
      <button class="btn btn-primary btn-sm" onclick="submitClaim()">Claim Task</button>
    </div>
  </div>
</div>

<!-- Update Task Modal -->
<div id="overlay-update" class="overlay hidden" onclick="closeModal('update',event)">
  <div class="modal" onclick="event.stopPropagation()">
    <h3>Update Task <span id="update-id" style="color:var(--dim)"></span></h3>
    <div class="field"><label>Agent Name</label><input id="upd-agent" type="text" placeholder="e.g. Cursor"></div>
    <div class="field">
      <label>New Status</label>
      <select id="upd-status">
        <option value="pending">Pending</option>
        <option value="in-progress">In Progress</option>
        <option value="done">Done</option>
        <option value="failed">Failed</option>
        <option value="abandoned">Abandoned</option>
      </select>
    </div>
    <div class="field"><label>Notes (optional)</label><textarea id="upd-notes" placeholder="What happened?"></textarea></div>
    <div class="modal-btns">
      <button class="btn btn-ghost btn-sm" onclick="closeModal('update')">Cancel</button>
      <button class="btn btn-primary btn-sm" onclick="submitUpdate()">Update</button>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
  const API = 'http://127.0.0.1:API_PORT/api';
  let claimTaskId = null;
  let updateTaskId = null;

  // ── Fetch helpers ──────────────────────────────────────
  async function get(path) {
    const r = await fetch(API + path);
    return r.json();
  }
  async function post(path, body) {
    const r = await fetch(API + path, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    return r.json();
  }

  // ── Toast ──────────────────────────────────────────────
  let toastTimer;
  function toast(msg, ok = true) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = 'toast show ' + (ok ? 'ok' : 'err');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.className = 'toast', 3000);
  }

  // ── Status ─────────────────────────────────────────────
  function setOnline(online) {
    const b = document.getElementById('statusBadge');
    const t = document.getElementById('statusText');
    if (online) {
      b.className = 'badge on';
      t.textContent = 'Running';
    } else {
      b.className = 'badge off';
      t.textContent = 'Offline';
    }
  }

  async function checkHealth() {
    try {
      await get('/health');
      setOnline(true);
      return true;
    } catch {
      setOnline(false);
      return false;
    }
  }

  // On panel open, retry until the server responds (max 15 seconds).
  async function waitForServer() {
    const deadline = Date.now() + 15000;
    while (Date.now() < deadline) {
      const ok = await checkHealth();
      if (ok) {
        // Server ready — do the full initial load.
        const d = await get('/tasks').catch(() => ({}));
        renderKanban(d.tasks ?? []);
        const currentTab = document.querySelector('.tab.active').textContent.toLowerCase();
        if (currentTab.includes('memos')) loadMemos();
        else if (currentTab.includes('fail')) loadFail();
        return;
      }
      await new Promise(r => setTimeout(r, 400));
    }
    // Timed out — leave badge as Offline.
  }

  // ── Kanban ─────────────────────────────────────────────
  function fmt(dt) {
    if (!dt) return '';
    const iso = dt.replace(' ', 'T') + (dt.endsWith('Z') ? '' : 'Z');
    return new Date(iso).toLocaleDateString(undefined, { month:'short', day:'numeric', hour:'2-digit', minute:'2-digit' });
  }

  function renderKanban(tasks) {
    const cols = { 'pending': [], 'in-progress': [], 'done': [], 'failed': [], 'abandoned': [] };
    tasks.forEach(t => (cols[t.status] ?? cols['abandoned']).push(t));
    for (const [status, items] of Object.entries(cols)) {
      const key = status.replace('-', '-');
      document.getElementById('cnt-' + key).textContent = items.length;
      const el = document.getElementById('col-' + key);
      if (!items.length) { el.innerHTML = '<div class="empty">No tasks</div>'; continue; }
      el.innerHTML = items.map(t => `
        <div class="card">
          <div class="card-id">#${t.id}</div>
          <div class="card-title">${esc(t.title)}</div>
          ${t.assigned_agent ? `<div class="card-agent">${esc(t.assigned_agent)}</div>` : ''}
          <div class="card-date">${fmt(t.created_at)}</div>
          <div class="card-btns">
            ${status === 'pending' ? `<button class="btn btn-sm b-claim" onclick="openClaim(${t.id})">Claim</button>` : ''}
            <button class="btn btn-sm b-update" onclick="openUpdate(${t.id}, '${status}')">Update</button>
          </div>
        </div>`).join('');
    }
  }

  function esc(s) {
    return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // ── Bottom tabs ────────────────────────────────────────
  function showTab(name) {
    document.querySelectorAll('.tab').forEach((t, i) => {
      const names = ['memos', 'failures','artifacts','generic-memories','memory'];
      t.classList.toggle('active', names[i] === name);
    });
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    document.getElementById('tab-' + name).classList.add('active');
    if (name === 'memos')     loadMemos();
    if (name === 'artifacts') loadArtifacts();
    if (name === 'memory')    loadMemory();
    if (name === 'failures')  loadFail();
    if (name === 'generic-memories') loadMemories();
  }

  async function loadMemos() {
    const d = await get('/memos');
    const el = document.getElementById('memoList');
    const items = d.memos ?? [];
    if (!items.length) { el.innerHTML = '<div class="empty">No memos left by agents yet.</div>'; return; }
    el.innerHTML = items.map(m => `
      <div class="item mem" style="border-left: 3px solid ${m.urgency === 'blocker' ? 'var(--c-failed)' : m.urgency === 'warning' ? '#F59E0B' : 'var(--c-done)'}">
        <div class="item-title" style="white-space: pre-wrap;">${esc(m.message)}</div>
        <div class="item-meta">
          <span style="color: ${m.urgency === 'blocker' ? 'var(--c-failed)' : m.urgency === 'warning' ? '#F59E0B' : 'var(--c-done)'}; text-transform: uppercase; font-weight: bold;">[${m.urgency}]</span> 
          · ${esc(m.author)} · ${fmt(m.created)}
        </div>
      </div>`).join('');
  }

  function renderFail(items) {
    const el = document.getElementById('failList');
    if (!items.length) { el.innerHTML = '<div class="empty">No failures logged.</div>'; return; }
    el.innerHTML = items.map(f => `
      <div class="item fail">
        <div class="item-title">${esc(f.approach)}</div>
        <div class="item-sub">${esc(f.reason)}</div>
        <div class="item-meta">${esc(f.agent_name)} · ${fmt(f.created_at)}</div>
      </div>`).join('');
  }

  async function loadFail() {
    const d = await get('/failures');
    renderFail(d.failures ?? []);
  }

  async function searchFail() {
    const q = document.getElementById('failQ').value.trim();
    if (!q) { loadFail(); return; }
    const d = await post('/failures/check', { query: q });
    renderFail(d.results ?? []);
  }

  async function loadArtifacts() {
    const d = await get('/artifacts');
    const el = document.getElementById('artList');
    const items = d.artifacts ?? [];
    if (!items.length) { el.innerHTML = '<div class="empty">No artifacts registered.</div>'; return; }
    el.innerHTML = items.map(a => `
      <div class="item art">
        <div class="item-title">${esc(a.name)}</div>
        <div class="item-path">${esc(a.path)}</div>
        <div class="item-sub">${esc(a.description)}</div>
        <div class="item-meta">${esc(a.agent_name)} · ${fmt(a.created_at)}</div>
      </div>`).join('');
  }

  async function loadMemory() {
    const d = await get('/working-memory');
    const el = document.getElementById('memList');
    const items = d.events ?? [];
    if (!items.length) { el.innerHTML = '<div class="empty">No events yet.</div>'; return; }
    el.innerHTML = items.map(m => `
      <div class="item mem">
        <div class="item-title">${esc(m.event_description)}</div>
        <div class="item-meta">${esc(m.agent_name)} · ${fmt(m.created_at)}</div>
      </div>`).join('');
  }

  function renderMemories(items) {
    const el = document.getElementById('genericMemList');
    if (!items.length) { el.innerHTML = '<div class="empty">No memories stored.</div>'; return; }
    el.innerHTML = items.map(m => {
      const tags = m.tags ? JSON.parse(m.tags) : [];
      return `
      <div class="item generic-mem">
        <div class="item-title">${esc(m.key)}</div>
        <div class="item-sub" style="white-space: pre-wrap;">${esc(m.content)}</div>
        ${tags.length ? `<div class="tags-row">${tags.map(t => `<span class="tag">${esc(t)}</span>`).join('')}</div>` : ''}
        <div class="item-meta">${esc(m.agent_name)} · updated ${fmt(m.updated_at)}</div>
      </div>`;
    }).join('');
  }

  async function loadMemories() {
    const d = await get('/memories');
    renderMemories(d.memories ?? []);
  }

  async function searchMemories() {
    const q = document.getElementById('memQ').value.trim();
    if (!q) { loadMemories(); return; }
    const d = await post('/memories/search', { query: q });
    renderMemories(d.results ?? []);
  }

  // ── Modals ─────────────────────────────────────────────
  function openModal(name) {
    document.getElementById('overlay-' + name).classList.remove('hidden');
  }
  function closeModal(name, evt) {
    if (evt && evt.target !== document.getElementById('overlay-' + name)) return;
    document.getElementById('overlay-' + name).classList.add('hidden');
  }

  async function createTask() {
    const title  = document.getElementById('nt-title').value.trim();
    const reason = document.getElementById('nt-reason').value.trim();
    if (!title) { toast('Title is required.', false); return; }
    const d = await post('/tasks/create', { title, reasoning: reason || undefined });
    if (d.error) { toast(d.error, false); return; }
    toast(`Task #${d.task.id} created.`);
    document.getElementById('nt-title').value = '';
    document.getElementById('nt-reason').value = '';
    closeModal('newTask');
    refresh();
  }

  function openClaim(id) {
    claimTaskId = id;
    document.getElementById('claim-id').textContent = '#' + id;
    document.getElementById('claim-agent').value = '';
    openModal('claim');
  }
  async function submitClaim() {
    const agent_name = document.getElementById('claim-agent').value.trim();
    if (!agent_name) { toast('Agent name required.', false); return; }
    const d = await post('/tasks/claim', { task_id: claimTaskId, agent_name });
    if (d.error) { toast(d.error, false); return; }
    toast(`Task #${claimTaskId} claimed by ${agent_name}.`);
    closeModal('claim');
    refresh();
  }

  function openUpdate(id, status) {
    updateTaskId = id;
    document.getElementById('update-id').textContent = '#' + id;
    document.getElementById('upd-status').value = status;
    document.getElementById('upd-agent').value = '';
    document.getElementById('upd-notes').value = '';
    openModal('update');
  }
  async function submitUpdate() {
    const agent_name = document.getElementById('upd-agent').value.trim();
    const status     = document.getElementById('upd-status').value;
    const notes      = document.getElementById('upd-notes').value.trim();
    if (!agent_name) { toast('Agent name required.', false); return; }
    const d = await post('/tasks/update', { task_id: updateTaskId, status, agent_name, notes: notes || undefined });
    if (d.error) { toast(d.error, false); return; }
    toast(`Task #${updateTaskId} → ${status}`);
    closeModal('update');
    refresh();
  }

  // ── Refresh ────────────────────────────────────────────
  async function refresh() {
    await checkHealth();
    const d = await get('/tasks');
    renderKanban(d.tasks ?? []);
    loadFail();
  }

  // Boot — wait until server is up, then start polling
  waitForServer();
  setInterval(async () => {
    await checkHealth();
    const d = await get('/tasks').catch(() => ({}));
    renderKanban(d.tasks ?? []);
    loadFail();
  }, 8000);
</script>
</body>
</html>
